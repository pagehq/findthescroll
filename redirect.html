<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Redirect</title>

  <script>
    const url = "https://example.com";

    window.location.href = url;
  </script>

  <meta http-equiv="refresh" content="0; url=https://example.com">
</head>
<body>
  <p>
    <a id="link">Click Here.</a>
  </p>

  <script>
    document.getElementById("link").href = url;
  </script>
</body>
</html>
